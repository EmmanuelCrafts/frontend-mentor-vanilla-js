<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Calculator App</title>
</head>
<body>
    <main>
        <div class="theme-toggle">
            <div class="title">
                <p>calc</p  >
            </div>
            <div class="theme-container">
                <p>THEME</p>
                <div class="toggle-container">
                   <div class="toggle-circle-container">
                       <div class="toggle-circle"></div>
                   </div>
                   <div class="number-toggles">
                       <span>1</span>
                       <span>2</span>
                       <span>3</span>
                   </div>
                   </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="display">
                <div class="display-screen">
                    <p class="display-value"></p>
                </div>
            </div>
            <div class="buttons">
                <div class="btn-inputs">
                    <button class="button seven">7</button>
                    <button class="button eight">8</button>
                    <button class="button nine">9</button>
                    <button class="button DEL">DEL</button>
                    <button class="button four">4</button>
                    <button class="button five">5</button>
                    <button class="button six">6</button>
                    <button class="button plus">+</button>
                    <button class="button one">1</button>
                    <button class="button two">2</button>
                    <button class="button three">3</button>
                    <button class="button minus">-</button>
                    <button class="button dot">.</button>
                    <button class="button zero">0</button>
                    <button class="button divide">/</button>
                    <button class="button multiply">x</button>
                </div>
                <div class="button-row">
                  <button class="btn reset">RESET</button>
                  <button class="btn equal">=</button>
                </div>
            </div>
    </main>
  <script src="script.js"></script>
</body>
</html>
